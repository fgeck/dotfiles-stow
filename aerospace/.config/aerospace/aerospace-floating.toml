# ============================================
# MONITOR ASSIGNMENT (optional - comment out if not using multi-monitor)
# ============================================
# [workspace-to-monitor-force-assignment]
#     0 = 2
#     1 = 2
#     2 = 2
#     3 = 'Built-in Retina Display'
#     4 = 3
#     5 = 2
#     6 = 2
#     7 = 2
